<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Notice & Exam Portal</title>
    <style>
        /* Modern Layout Setup */
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: #f8fafc; /* Softer background gray */
            margin: 0;
            padding: 0;
            color: #1e293b;
        }

        /* Upgraded Luxury Header Banner */
        .header-banner {
            background: linear-gradient(135deg, #1e3a8a, #0f172a); /* Darker, richer navy gradient */
            color: white;
            padding: 50px 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* Adds a subtle geometric design accent behind the text */
        .header-banner::before {
            content: "";
            position: absolute;
            top: -50%;
            left: -20%;
            width: 140%;
            height: 200%;
            background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, transparent 60%);
            pointer-events: none;
        }

        .header-banner h1 {
            margin: 0;
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        .header-banner p {
            margin: 12px 0 0 0;
            opacity: 0.85;
            font-size: 1.15rem;
            font-weight: 400;
        }

        /* Two-Column Grid Container */
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }

        /* Premium Floating Card Design */
        .card {
            background: #ffffff;
            border-radius: 20px; /* Smoother rounded corners */
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05); /* Premium soft shadow */
            padding: 30px;
            border: 1px solid rgba(226, 232, 240, 0.8);
            transition: transform 0.2s ease;
        }

        /* Hover animation to make it feel alive */
        .card:hover {
            transform: translateY(-2px);
        }

        .card h2 {
            margin-top: 0;
            color: #1e3a8a;
            font-size: 1.6rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        /* Premium integration for Google Frames */
        iframe {
            border: none;
            border-radius: 12px;
            width: 100%;
            background: #ffffff;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }

        /* Responsive Desktop Layout (Side-by-side) */
        @media (min-width: 850px) {
            .container {
                grid-template-columns: 2fr 3fr; /* Notice Board left, Calendar right */
                align-items: start;
            }
        }
    </style>
</head>
<body>

    <div class="header-banner">
        <h1>University Notice & Exam Portal</h1>
        <p>Your central hub for schedules, announcements, and syllabi updates</p>
    </div>

    <div class="container">

        <!-- Section 1: Notice Board -->
        <div class="card">
            <h2>📢 Live Notice Board</h2>
            <iframe src="https://docs.google.com/document/d/e/2PACX-1vRYvhjtGA_d1ab6WQLW0BCvp10RFNkj3Xh5YE0mhgAulqtnhHi_yFewP9r6uE8kS8wktWRDZFpqmdf/pub?embedded=true" height="500"></iframe>
        </div>

        <!-- Section 2: Calendar -->
        <div class="card">
            <h2>📅 Exam Schedule & Deadlines</h2>
            <iframe src="https://calendar.google.com/calendar/embed?src=usefullkor%40gmail.com&ctz=Asia%2FDhaka&wkst=7&bgcolor=%23ffffff&showTitle=0&showNav=1&showDate=1&showPrint=0&showTabs=1&showCalendars=0" height="600"></iframe>
        </div>

    </div>

</body>
</html>
